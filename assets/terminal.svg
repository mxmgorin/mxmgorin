<svg xmlns="http://www.w3.org/2000/svg" width="683" height="312" viewBox="0 0 683 312" role="img" aria-label="Terminal session: whoami, tech stack, hobbies"><title>mxmgorin — terminal session</title><clipPath id="win"><rect x="0" y="0" width="683" height="312" rx="10"/></clipPath><g clip-path="url(#win)"><rect x="0" y="0" width="683" height="312" fill="#0b1a12"/><rect x="0" y="0" width="683" height="26" fill="#0f231a"/><circle cx="17" cy="13" r="4.5" fill="#f7768e"/><circle cx="33" cy="13" r="4.5" fill="#e0af68"/><circle cx="49" cy="13" r="4.5" fill="#5ff28b"/><text x="342" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5c8a72">bash</text></g><g font-family="'JetBrains Mono','Fira Code','Cascadia Code',ui-monospace,'DejaVu Sans Mono',Consolas,Menlo,monospace" font-size="15" xml:space="preserve"><text x="22" y="51" fill="#5ff28b" opacity="1">mxmgorin:~$ <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.03805;0.04566;1" dur="9198ms" fill="freeze"/></text><text x="22" y="151" fill="#5ff28b" opacity="1">mxmgorin:~$ <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.17091;0.17852;1" dur="9198ms" fill="freeze"/></text><text x="22" y="231" fill="#5ff28b" opacity="1">mxmgorin:~$ <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.31724;0.32485;1" dur="9198ms" fill="freeze"/></text><text x="22" y="291" fill="#5ff28b" opacity="1">mxmgorin:~$ <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.51076;0.51837;1" dur="9198ms" fill="freeze"/></text><clipPath id="clip0"><rect x="130.0" y="38" height="20" width="57.0"><animate attributeName="width" values="0;0;57.0;57.0" keyTimes="0;0.03805;0.0785;1" dur="9198ms" fill="freeze"/></rect></clipPath><text x="130.0" y="51" fill="#c6f7d5" clip-path="url(#clip0)">whoami</text><clipPath id="clip1"><rect x="130.0" y="138" height="20" width="75.0"><animate attributeName="width" values="0;0;75.0;75.0" keyTimes="0;0.17091;0.22483;1" dur="9198ms" fill="freeze"/></rect></clipPath><text x="130.0" y="151" fill="#c6f7d5" clip-path="url(#clip1)">neofetch</text><clipPath id="clip2"><rect x="130.0" y="218" height="20" width="138.0"><animate attributeName="width" values="0;0;138.0;138.0" keyTimes="0;0.31724;0.41835;1" dur="9198ms" fill="freeze"/></rect></clipPath><text x="130.0" y="231" fill="#c6f7d5" clip-path="url(#clip2)">cat ~/.freetime</text><text x="22" y="71" opacity="1"><tspan fill="#8fd3a3">Backend engineer building trading and financial systems, focused on</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.09589;0.1122;1" dur="9198ms" fill="freeze"/></text><text x="22" y="91" opacity="1"><tspan fill="#8fd3a3">performance, reliability, and the architecture of complex software.</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.09589;0.1122;1" dur="9198ms" fill="freeze"/></text><text x="22" y="111" opacity="1"><tspan fill="#8fd3a3">Mostly Rust these days, C# for years before that. On the side I build</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.09589;0.1122;1" dur="9198ms" fill="freeze"/></text><text x="22" y="131" opacity="1"><tspan fill="#8fd3a3">emulators, VMs, interpreters, and tools for retro handhelds.</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.09589;0.1122;1" dur="9198ms" fill="freeze"/></text><text x="22" y="171" opacity="1"><tspan fill="#9fe86f"> Languages:  </tspan><tspan fill="#8fd3a3">Rust · Go · C# / .NET · JavaScript</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.24223;0.25853;1" dur="9198ms" fill="freeze"/></text><text x="22" y="191" opacity="1"><tspan fill="#9fe86f"> Backend:    </tspan><tspan fill="#8fd3a3">gRPC · REST · PostgreSQL · Docker · Kubernetes</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.24223;0.25853;1" dur="9198ms" fill="freeze"/></text><text x="22" y="211" opacity="1"><tspan fill="#9fe86f"> UI:         </tspan><tspan fill="#8fd3a3">egui · Dioxus · SDL2 · Blazor</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.24223;0.25853;1" dur="9198ms" fill="freeze"/></text><text x="22" y="251" opacity="1"><tspan fill="#8fd3a3">Retro-gaming fan, Linux + open-source enthusiast, newly into sci-fi.</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.43575;0.45205;1" dur="9198ms" fill="freeze"/></text><text x="22" y="271" opacity="1"><tspan fill="#8fd3a3">Buried in Game Boys, cartridges, handhelds — the weirder, the better. 🎮</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.43575;0.45205;1" dur="9198ms" fill="freeze"/></text><rect y="41" width="9.0" height="14" fill="#5ff28b" x="130.0" opacity="0"><animate attributeName="x" values="130.0;130.0;184.0;184.0" keyTimes="0;0.03805;0.0785;1" dur="9198ms" fill="freeze"/><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.03805;0.0785;1" calcMode="discrete" dur="9198ms" fill="freeze"/></rect><rect y="141" width="9.0" height="14" fill="#5ff28b" x="130.0" opacity="0"><animate attributeName="x" values="130.0;130.0;202.0;202.0" keyTimes="0;0.17091;0.22483;1" dur="9198ms" fill="freeze"/><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.17091;0.22483;1" calcMode="discrete" dur="9198ms" fill="freeze"/></rect><rect y="221" width="9.0" height="14" fill="#5ff28b" x="130.0" opacity="0"><animate attributeName="x" values="130.0;130.0;265.0;265.0" keyTimes="0;0.31724;0.41835;1" dur="9198ms" fill="freeze"/><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.31724;0.41835;1" calcMode="discrete" dur="9198ms" fill="freeze"/></rect><rect x="130.0" y="281" width="9.0" height="14" fill="#5ff28b" opacity="0"><animate attributeName="opacity" values="1;0" keyTimes="0;0.5" calcMode="discrete" dur="960ms" begin="4698ms" repeatCount="indefinite"/></rect></g><rect x="0.5" y="0.5" width="682" height="311" rx="10" fill="none" stroke="#1c3b2c" stroke-width="1"/></svg>
