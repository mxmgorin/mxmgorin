p0)">whoami</text><clipPath id="clip1"><rect x="130.0" y="173" height="23" width="156.0"><animate attributeName="width" values="0;0;156.0;156.0" keyTimes="0;0.14239;0.23786;1" dur="11040ms" fill="freeze"/></rect></clipPath><text x="130.0" y="189" fill="#c6f7d5" clip-path="url(#clip1)">cat what-i-do.txt</text><clipPath id="clip2"><rect x="130.0" y="288" height="23" width="75.0"><animate attributeName="width" values="0;0;75.0;75.0" keyTimes="0;0.31486;0.35978;1" dur="11040ms" fill="freeze"/></rect></clipPath><text x="130.0" y="304" fill="#c6f7d5" clip-path="url(#clip2)">neofetch</text><clipPath id="clip3"><rect x="130.0" y="472" height="23" width="129.0"><animate attributeName="width" values="0;0;129.0;129.0" keyTimes="0;0.43678;0.5154;1" dur="11040ms" fill="freeze"/></rect></clipPath><text x="130.0" y="488" fill="#c6f7d5" clip-path="url(#clip3)">cat ~/.hobbies</text><text x="22" y="97" opacity="1"><tspan fill="#8fd3a3">Backend engineer in fintech, building high-load distributed systems.</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.07989;0.09348;1" dur="11040ms" fill="freeze"/></text><text x="22" y="120" opacity="1"><tspan fill="#8fd3a3">For fun, I write emulators and interpreters to learn how</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.07989;0.09348;1" dur="11040ms" fill="freeze"/></text><text x="22" y="143" opacity="1"><tspan fill="#8fd3a3">computers really work — mostly in Rust 🦀.</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.07989;0.09348;1" dur="11040ms" fill="freeze"/></text><text x="22" y="212" opacity="1"><tspan fill="#8fd3a3">backend      services that stay correct, observable, and fast at scale</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.25236;0.26594;1" dur="11040ms" fill="freeze"/></text><text x="22" y="235" opacity="1"><tspan fill="#8fd3a3">emulation    emulators, interpreters, VMs — every cycle and byte counts</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.25236;0.26594;1" dur="11040ms" fill="freeze"/></text><text x="22" y="258" opacity="1"><tspan fill="#8fd3a3">full-stack   from the database up to the UI, on the web or native</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.25236;0.26594;1" dur="11040ms" fill="freeze"/></text><text x="22" y="327" opacity="1"><tspan fill="#356b4f">────────────────────────────────────────────────────────────</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.37428;0.38786;1" dur="11040ms" fill="freeze"/></text><text x="22" y="350" opacity="1"><tspan fill="#9fe86f"> Languages   </tspan><tspan fill="#8fd3a3">Rust · Go · C# / .NET · TypeScript · JavaScript · Lua</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.37428;0.38786;1" dur="11040ms" fill="freeze"/></text><text x="22" y="373" opacity="1"><tspan fill="#9fe86f"> Backend     </tspan><tspan fill="#8fd3a3">PostgreSQL · Docker · Kubernetes · Bash</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.37428;0.38786;1" dur="11040ms" fill="freeze"/></text><text x="22" y="396" opacity="1"><tspan fill="#9fe86f"> UI          </tspan><tspan fill="#8fd3a3">egui · Dioxus · SDL2 · Blazor · Vue.js · Angular</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.37428;0.38786;1" dur="11040ms" fill="freeze"/></text><text x="22" y="419" opacity="1"><tspan fill="#9fe86f"> Tools / OS  </tspan><tspan fill="#8fd3a3">Git · Arch Linux</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.37428;0.38786;1" dur="11040ms" fill="freeze"/></text><text x="22" y="442" opacity="1"><tspan fill="#356b4f">────────────────────────────────────────────────────────────</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.37428;0.38786;1" dur="11040ms" fill="freeze"/></text><text x="22" y="511" opacity="1"><tspan fill="#8fd3a3">Tinkering with Linux, retro hardware, and reviving classic games</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.52989;0.54348;1" dur="11040ms" fill="freeze"/></text><text x="22" y="534" opacity="1"><tspan fill="#8fd3a3">on new devices. Emulation, open source, and old systems = a good time.</tspan><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.52989;0.54348;1" dur="11040ms" fill="freeze"/></text><rect y="61" width="9.0" height="17" fill="#5ff28b" x="130.0" opacity="0"><animate attributeName="x" values="130.0;130.0;184.0;184.0" keyTimes="0;0.0317;0.0654;1" dur="11040ms" fill="freeze"/><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.0317;0.0654;1" calcMode="discrete" dur="11040ms" fill="freeze"/></rect><rect y="176" width="9.0" height="17" fill="#5ff28b" x="130.0" opacity="0"><animate attributeName="x" values="130.0;130.0;283.0;283.0" keyTimes="0;0.14239;0.23786;1" dur="11040ms" fill="freeze"/><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.14239;0.23786;1" calcMode="discrete" dur="11040ms" fill="freeze"/></rect><rect y="291" width="9.0" height="17" fill="#5ff28b" x="130.0" opacity="0"><animate attributeName="x" values="130.0;130.0;202.0;202.0" keyTimes="0;0.31486;0.35978;1" dur="11040ms" fill="freeze"/><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.31486;0.35978;1" calcMode="discrete" dur="11040ms" fill="freeze"/></rect><rect y="475" width="9.0" height="17" fill="#5ff28b" x="130.0" opacity="0"><animate attributeName="x" values="130.0;130.0;256.0;256.0" keyTimes="0;0.43678;0.5154;1" dur="11040ms" fill="freeze"/><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.43678;0.5154;1" calcMode="discrete" dur="11040ms" fill="freeze"/></rect><rect x="130.0" y="567" width="9.0" height="17" fill="#5ff28b" opacity="0"><animate attributeName="opacity" values="1;0" keyTimes="0;0.5" calcMode="discrete" dur="960ms" begin="6540ms" repeatCount="indefinite"/></rect></g><rect x="0.5" y="0.5" width="682" height="606" rx="10" fill="none" stroke="#1c3b2c" stroke-width="1"/></svg